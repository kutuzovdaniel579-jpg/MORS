<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MORS – Devlog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Development log for MORS, auto-generated from GitHub releases.">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050509;
            color: #f5f5f5;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.6;
        }

        header {
            border-bottom: 1px solid #2b2b2b;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: radial-gradient(circle at top, #2b0000 0, #050509 55%);
        }

        .logo {
            font-size: 1.6rem;
            letter-spacing: 0.25rem;
            text-transform: uppercase;
            font-weight: 800;
            color: #ff2b2b;
        }

        nav a {
            color: #d0d0d0;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.12rem;
        }

        nav a:hover { color: #ffffff; }

        main {
            max-width: 960px;
            margin: 3rem auto;
            padding: 0 1.5rem 4rem;
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.18rem;
        }

        .tagline {
            color: #ff6666;
            font-size: 0.95rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .entry {
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #2b2b2b;
        }

        .entry h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.12rem;
            color: #ffb3b3;
        }

        .date {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 1rem;
        }

        p { margin-bottom: 0.75rem; color: #e0e0e0; }

        footer {
            border-top: 1px solid #2b2b2b;
            padding: 1rem 2rem;
            font-size: 0.8rem;
            color: #9a9a9a;
            text-align: center;
            background: #050509;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">MORS</div>
    <nav>
        <a href="../index.html">Home</a>
        <a href="../about/index.html">About</a>
        <a href="./index.html">Devlog</a>
        <a href="../contact/index.html">Contact</a>
    </nav>
</header>

<main>
    <h1>Devlog</h1>
    <div class="tagline">AUTO‑GENERATED FROM RELEASES · TAGS CONTAINING “D”</div>

    <div id="devlog-container">
        <p>Loading devlog entries...</p>
    </div>
</main>

<footer>
    MORS &copy; <!-- year --> – Development Log
</footer>

<script>
async function loadDevlog() {
    const container = document.getElementById("devlog-container");

    try {
        const response = await fetch("https://api.github.com/repos/kutuzovdaniel579-jpg/MORS/releases");
        const releases = await response.json();

        const filtered = releases.filter(r => r.tag_name && r.tag_name.includes("D"));

        if (filtered.length === 0) {
            container.innerHTML = "<p>No Devlog releases found with tag containing 'D'.</p>";
            return;
        }

        container.innerHTML = "";

        filtered.forEach(rel => {
            const entry = document.createElement("div");
            entry.className = "entry";

            const date = new Date(rel.published_at).toLocaleDateString();

            entry.innerHTML = `
                <h2>${rel.name || rel.tag_name}</h2>
                <div class="date">${date}</div>
                <p>${rel.body ? rel.body.replace(/\n/g, "<br>") : "No description provided."}</p>
                <p><a href="${rel.html_url}" target="_blank" style="color:#ff4444;">View Release →</a></p>
            `;

            container.appendChild(entry);
        });

    } catch (err) {
        container.innerHTML = "<p>Error loading releases.</p>";
        console.error(err);
    }
}

loadDevlog();
</script>

</body>
</html>
